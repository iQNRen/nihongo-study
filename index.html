<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語学習 — Japanese Learning</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%231A1A2E'/><text x='50' y='72' font-size='62' text-anchor='middle' fill='%23F2C6C2' font-family='serif'>あ</text></svg>">
    <link rel="stylesheet" href="src/css/style.css">
    <script type="module" src="src/js/core.js" defer></script>
</head>

<body>

    <header>
        <div class="header-bg"></div>
        <div class="header-particles" id="header-particles"></div>
        <div class="enso-circle"></div>
        <div class="header-content">
            <h1>日本語学習</h1>
            <p class="subtitle">Japanese Learning</p>
        </div>
        <svg class="header-wave" viewBox="0 0 1440 80" preserveAspectRatio="none">
            <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z" fill="var(--bg)"/>
        </svg>
        <div class="header-divider"></div>
    </header>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" title="回到顶部" aria-label="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <nav>
        <div class="nav-tab active" data-tab="gojuon">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>五十音</span>
        </div>
        <div class="nav-tab" data-tab="words">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="13" y2="11"/></svg>
            <span>单词</span>
        </div>
        <div class="nav-tab" data-tab="sentences">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="14" y2="12"/></svg>
            <span>句子</span>
        </div>
        <div class="nav-tab" data-tab="quiz">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <span>测试</span>
        </div>
    </nav>

    <div class="container">

        <!-- 五十音 Panel -->
        <section id="gojuon" class="panel active">
            <div id="gojuon-container">
                <div id="gojuon-table" class="gojuon-table">
                    <!-- Generated via JS -->
                </div>
            </div>
        </section>

        <!-- 单词 Panel -->
        <section id="words" class="panel">
            <div class="controls-area">
                <input type="text" id="word-search" class="search-input" placeholder="搜索单词...">

                <div class="custom-select" id="word-category" data-value="all">
                    <div class="custom-select-trigger"><span class="select-text"></span><span class="select-reset" title="重置">&times;</span></div>
                    <div class="custom-select-options"></div>
                </div>
            </div>
            <div id="words-container" class="list-container">
                <!-- Generated via JS -->
            </div>
            <div id="words-pagination" class="pagination-area">
                <!-- Generated via JS -->
            </div>
        </section>

        <!-- 句子 Panel -->
        <section id="sentences" class="panel">
            <div class="controls-area">
                <input type="text" id="sentence-search" class="search-input" placeholder="搜索句子...">

                <div class="custom-select" id="sentence-category" data-value="all">
                    <div class="custom-select-trigger"><span class="select-text"></span><span class="select-reset" title="重置">&times;</span></div>
                    <div class="custom-select-options"></div>
                </div>
            </div>
            <div id="sentences-container" class="sentence-list-container">
                <!-- Generated via JS -->
            </div>
            <div id="sentences-pagination" class="pagination-area">
                <!-- Generated via JS -->
            </div>
        </section>

        <!-- 测试 Panel -->
        <section id="quiz" class="panel">

            <!-- Setup -->
            <div id="quiz-setup">
                <div class="quiz-setup-header">
                    <h2>选择练习模式</h2>
                    <p class="quiz-setup-sub">选择题型和题量，开始练习</p>
                </div>

                <div class="quiz-modes">
                    <div class="quiz-mode-card" data-mode="jp-cn" onclick="window.quizManager.selectMode('jp-cn')">
                        <div class="quiz-mode-icon">あ</div>
                        <div class="quiz-mode-info">
                            <h3>看日选中</h3>
                            <p>看日语单词，选中文意思</p>
                        </div>
                        <span class="quiz-mode-difficulty difficulty-easy">简单</span>
                    </div>

                    <div class="quiz-mode-card" data-mode="cn-jp" onclick="window.quizManager.selectMode('cn-jp')">
                        <div class="quiz-mode-icon">汉</div>
                        <div class="quiz-mode-info">
                            <h3>看中选日</h3>
                            <p>看中文意思，选日语单词</p>
                        </div>
                        <span class="quiz-mode-difficulty difficulty-medium">中等</span>
                    </div>

                    <div class="quiz-mode-card" data-mode="listen" onclick="window.quizManager.selectMode('listen')">
                        <div class="quiz-mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                        </div>
                        <div class="quiz-mode-info">
                            <h3>听音选词</h3>
                            <p>听发音，选出正确的日语单词</p>
                        </div>
                        <span class="quiz-mode-difficulty difficulty-medium">中等</span>
                    </div>

                    <div class="quiz-mode-card" data-mode="kana" onclick="window.quizManager.selectMode('kana')">
                        <div class="quiz-mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        </div>
                        <div class="quiz-mode-info">
                            <h3>假名识读</h3>
                            <p>看假名，选正确的罗马音读法</p>
                        </div>
                        <span class="quiz-mode-difficulty difficulty-easy">简单</span>
                    </div>

                    <div class="quiz-mode-card" data-mode="spell" onclick="window.quizManager.selectMode('spell')">
                        <div class="quiz-mode-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="28" height="28"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                        </div>
                        <div class="quiz-mode-info">
                            <h3>拼写挑战</h3>
                            <p>根据中文意思，拼出日语单词</p>
                        </div>
                        <span class="quiz-mode-difficulty difficulty-hard">困难</span>
                    </div>
                </div>

                <!-- Question count & start (hidden until mode selected) -->
                <div id="quiz-start-area" class="quiz-start-area" style="display:none;">
                    <div class="quiz-count-selector">
                        <span class="quiz-count-label">题量</span>
                        <div class="quiz-count-btns">
                            <button class="quiz-count-btn" data-count="10" onclick="window.quizManager.setCount(10)">10</button>
                            <button class="quiz-count-btn active" data-count="20" onclick="window.quizManager.setCount(20)">20</button>
                            <button class="quiz-count-btn" data-count="30" onclick="window.quizManager.setCount(30)">30</button>
                            <button class="quiz-count-btn" data-count="50" onclick="window.quizManager.setCount(50)">50</button>
                        </div>
                    </div>
                    <button class="btn btn-primary quiz-start-btn" onclick="window.quizManager.startSelected()">开始练习</button>
                </div>
            </div>

            <!-- Active Quiz -->
            <div id="quiz-active" style="display: none;">
                <div class="quiz-progress-bar">
                    <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
                </div>
                <div class="quiz-progress-text" id="quiz-progress-text"></div>
                <div class="quiz-card">
                    <div class="quiz-question" id="quiz-q-text">?</div>
                    <div id="quiz-hint" class="quiz-hint" style="display:none;"></div>
                    <div class="quiz-options" id="quiz-options">
                        <!-- Generated via JS -->
                    </div>
                    <div id="quiz-input-area" style="display:none;">
                        <input type="text" id="quiz-input" class="quiz-input" placeholder="输入日语单词...">
                        <button class="btn btn-primary" onclick="window.quizManager.submitInput()" style="margin-top:0.8rem; width:100%;">确认</button>
                    </div>
                    <div style="margin-top: 2rem; text-align: center;">
                        <button class="btn btn-secondary" onclick="window.quizManager.exitQuiz()">退出测试</button>
                    </div>
                </div>
            </div>

            <!-- Result -->
            <div id="quiz-result" style="display: none;">
                <div class="quiz-card" style="text-align: center;">
                    <h2>测试完成</h2>
                    <div class="result-circle">
                        <svg viewBox="0 0 120 120" class="result-ring">
                            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--border)" stroke-width="8"/>
                            <circle cx="60" cy="60" r="52" fill="none" stroke="var(--asagi)" stroke-width="8"
                                stroke-dasharray="327" stroke-dashoffset="327" stroke-linecap="round"
                                id="result-ring-fill" transform="rotate(-90 60 60)"/>
                        </svg>
                        <span class="result-percent" id="result-percent">0%</span>
                    </div>
                    <div class="result-stats" id="result-stats"></div>
                    <div style="display: flex; gap: 0.8rem; justify-content: center; margin-top: 1.5rem;">
                        <button class="btn btn-secondary" onclick="window.quizManager.exitQuiz()">返回菜单</button>
                        <button class="btn btn-primary" onclick="window.quizManager.retryQuiz()">再来一次</button>
                    </div>
                </div>
                <div id="result-review" class="result-review"></div>
            </div>

        </section>

    </div>

</body>

</html>
